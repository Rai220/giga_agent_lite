name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish to docs/
        run: |
          mkdir -p docs/assets

          # Merge new build into docs/ without deleting old assets.
          # Browsers that cached a previous index.html (GitHub Pages caches
          # HTML for ~10 min) can still fetch old JS chunks during that window.
          cp -r dist/* docs/

          # Prune stale assets: keep current + one previous build, remove older.
          ls dist/assets/ > /tmp/keep-assets.txt
          if [ -f docs/.previous-assets ]; then
            cat docs/.previous-assets >> /tmp/keep-assets.txt
          fi
          for f in docs/assets/*; do
            name=$(basename "$f")
            if ! grep -qxF "$name" /tmp/keep-assets.txt; then
              rm -f "$f"
            fi
          done
          ls dist/assets/ > docs/.previous-assets

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ -f
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "build: update docs/ [skip ci]"
          git push
