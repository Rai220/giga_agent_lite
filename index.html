<!DOCTYPE html>
<html lang="ru">
  <head>
    <script>if(location.hostname.endsWith('.github.io')&&!location.pathname.includes('/docs'))location.href=location.pathname.replace(/\/?$/,'/docs/');</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GigaAgent Lite</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>"
    />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__header">
          <span class="sidebar__title">History</span>
          <button id="new-chat-btn" class="btn btn--small" title="New Chat">
            + New
          </button>
        </div>
        <div class="sidebar__list" id="conversation-list"></div>
      </aside>

      <!-- Main area -->
      <div class="main">
        <header class="header">
          <button
            id="sidebar-toggle"
            class="btn btn--icon"
            title="Toggle sidebar"
          >
            &#9776;
          </button>
          <h1 class="header__title">GigaAgent Lite</h1>
          <div class="header__controls">
            <select id="provider-select" class="provider-select">
              <option value="gigachat">GigaChat</option>
              <option value="openai">OpenAI</option>
              <option value="anthropic">Anthropic</option>
            </select>
            <button id="settings-btn" class="btn btn--icon" title="Settings">
              &#9881;
            </button>
          </div>
        </header>

        <main class="chat" id="chat">
          <div class="chat__welcome">
            <h2>GigaAgent Lite</h2>
            <p>
              Universal LLM agent: GigaChat, OpenAI, Anthropic.
            </p>
            <p>Configure API keys in &#9881; settings, then start chatting.</p>
          </div>
        </main>

        <footer class="input-area">
          <textarea
            id="message-input"
            class="input-area__textarea"
            placeholder="Type a message... (Shift+Enter for newline)"
            rows="2"
          ></textarea>
          <button id="send-btn" class="btn btn--primary">Send</button>
        </footer>
      </div>

      <!-- Settings Modal -->
      <div class="modal-overlay" id="settings-modal" hidden>
        <div class="modal">
          <div class="modal__header">
            <h2 id="modal-title">Settings</h2>
            <button class="modal__close">&times;</button>
          </div>
          <div class="modal__body" id="settings-body"></div>
          <div class="modal__footer">
            <button id="settings-save" class="btn btn--primary">Save</button>
            <button id="settings-cancel" class="btn btn--secondary">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
