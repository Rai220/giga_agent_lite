<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GigaAgent Lite</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1 class="header__title">GigaAgent Lite</h1>
        <div class="header__controls">
          <select id="provider-select" class="provider-select">
            <option value="gigachat">GigaChat</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
          </select>
          <button id="settings-btn" class="btn btn--icon" title="Settings">&#9881;</button>
        </div>
      </header>

      <main class="chat" id="chat">
        <div class="chat__welcome">
          <h2>Welcome to GigaAgent Lite</h2>
          <p>A browser-based universal LLM agent supporting GigaChat, OpenAI, and Anthropic.</p>
          <p>Select a provider above, configure your API key in settings, and start chatting.</p>
        </div>
      </main>

      <footer class="input-area">
        <textarea
          id="message-input"
          class="input-area__textarea"
          placeholder="Type a message..."
          rows="1"
        ></textarea>
        <button id="send-btn" class="btn btn--primary">Send</button>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
